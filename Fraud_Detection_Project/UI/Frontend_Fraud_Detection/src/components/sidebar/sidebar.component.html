<aside class="flex flex-col h-screen w-64 bg-dark-card/80 backdrop-blur-xl border-r border-slate-700/50 fixed left-0 top-0 z-40 shadow-2xl">

  <!-- Logo -->
  <div class="flex items-center gap-3 px-6 py-6 border-b border-slate-700/50">
    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-blue-600 flex items-center justify-center shadow-lg shadow-primary/30 flex-shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
      </svg>
    </div>
    <div>
      <p class="text-white font-bold text-sm leading-tight">FraudShield</p>
      <p class="text-slate-400 text-xs">AI Detection System</p>
    </div>
  </div>

  <!-- User Badge -->
  <div class="px-6 py-4 border-b border-slate-700/30">
    <div class="flex items-center gap-3 bg-slate-800/50 rounded-xl p-3">
      <div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-blue-500 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">
        {{ currentUser?.firstName?.charAt(0) }}{{ currentUser?.lastName?.charAt(0) }}
      </div>
      <div class="min-w-0">
        <p class="text-white text-sm font-medium truncate">{{ currentUser?.firstName }} {{ currentUser?.lastName }}</p>
        <span class="inline-block text-xs px-2 py-0.5 rounded-full mt-0.5"
          [ngClass]="isAdmin() ? 'bg-primary/20 text-primary' : 'bg-status-success/20 text-status-success'">
          {{ currentUser?.role }}
        </span>
      </div>
    </div>
  </div>

  <!-- Nav Links -->
  <nav class="flex-1 px-4 py-4 space-y-1 overflow-y-auto">

    <!-- Admin nav -->
    <ng-container *ngIf="isAdmin()">
      <p class="text-slate-500 text-xs font-semibold uppercase tracking-widest px-3 mb-2">Admin</p>

      <a routerLink="/admin/dashboard" routerLinkActive="bg-primary/10 text-primary border-primary/40"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-300 border border-transparent hover:bg-slate-700/40 hover:text-white transition-all duration-200 text-sm font-medium">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
        </svg>
        Dashboard
      </a>

      <a routerLink="/admin/alerts" routerLinkActive="bg-primary/10 text-primary border-primary/40"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-300 border border-transparent hover:bg-slate-700/40 hover:text-white transition-all duration-200 text-sm font-medium">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        Fraud Alerts
        <span class="ml-auto flex items-center justify-center">
          <span [ngClass]="hasUnresolvedAlerts ? 'bg-status-danger animate-pulse shadow-lg shadow-status-danger/40' : 'bg-status-success shadow-lg shadow-status-success/40'" 
                class="w-2.5 h-2.5 rounded-full transition-all duration-300">
          </span>
        </span>
      </a>
    </ng-container>

    <!-- User nav -->
    <ng-container *ngIf="!isAdmin()">
      <p class="text-slate-500 text-xs font-semibold uppercase tracking-widest px-3 mb-2">Donor</p>

      <a routerLink="/user/dashboard" routerLinkActive="bg-primary/10 text-primary border-primary/40"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-300 border border-transparent hover:bg-slate-700/40 hover:text-white transition-all duration-200 text-sm font-medium">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
        </svg>
        Make a Donation
      </a>
    </ng-container>
  </nav>

  <!-- Logout -->
  <div class="px-4 py-4 border-t border-slate-700/50">
    <button (click)="logout()"
      class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl text-slate-400 hover:bg-status-danger/10 hover:text-status-danger border border-transparent hover:border-status-danger/30 transition-all duration-200 text-sm font-medium">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Sign Out
    </button>
  </div>
</aside>
