<div class="min-h-screen flex items-center justify-center bg-dark-bg relative overflow-hidden">
  <!-- Decorative background elements -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/20 blur-[120px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-dark-blue/40 blur-[120px]"></div>

  <div class="w-full max-w-md p-8 glass-card z-10 mx-4">
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 rounded-2xl bg-primary flex items-center justify-center shadow-lg shadow-primary/30">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
      </div>
    </div>
    
    <h2 class="text-3xl font-bold text-center text-white mb-2">AI Donation Fraud<br>Detection</h2>
    <p class="text-center text-slate-400 mb-8 text-sm">Secure access to the monitoring dashboard</p>

    <div *ngIf="error" class="mb-4 p-3 rounded bg-status-danger/20 border border-status-danger/50 text-status-danger text-sm text-center">
      {{error}}
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="mb-5">
        <label class="block text-slate-300 text-sm font-medium mb-2">Email Address</label>
        <input type="email" [(ngModel)]="email" name="email" class="input-field" placeholder="admin@charity.org" required>
      </div>

      <div class="mb-6">
        <label class="block text-slate-300 text-sm font-medium mb-2">Password</label>
        <input type="password" [(ngModel)]="password" name="password" class="input-field" placeholder="Enter your password" required>
      </div>

      <div class="flex items-center justify-between mb-8">
        <label class="flex items-center text-sm text-slate-300 cursor-pointer">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" class="w-4 h-4 rounded border-slate-600 bg-dark-bg/50 text-primary focus:ring-primary">
          <span class="ml-2">Remember me</span>
        </label>
        <a href="#" class="text-sm text-primary hover:text-primary-dark transition-colors">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-primary mb-6" [disabled]="isLoading">
        {{ isLoading ? 'Signing In...' : 'Sign In' }}
      </button>

      <div class="text-center">
        <p class="text-sm text-slate-400 mb-4">Protected by AI-driven fraud monitoring and secure authentication.</p>
        <div class="mt-4 pt-4 border-t border-slate-700/50">
          <p class="text-sm text-slate-300">Not registered? <a routerLink="/register" class="text-primary hover:text-primary-dark font-medium">Register Now</a></p>
        </div>
      </div>
    </form>
  </div>
</div>
